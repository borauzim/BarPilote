<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script>
        (function () {
            try {
                var stored = localStorage.getItem('barpilote_theme_mode') || 'system';
                var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                var resolved = stored === 'dark' || stored === 'light' ? stored : (prefersDark ? 'dark' : 'light');
                document.documentElement.classList.toggle('dark', resolved === 'dark');
                document.documentElement.style.colorScheme = resolved;
                document.documentElement.dataset.theme = resolved;
            } catch (error) {}
        })();
    </script>
    <title>{% block title %}BarPilote{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-low": "#f3f3f5",
                        "on-surface": "#1a1c1d",
                        "primary-container": "#ff5e00",
                        "on-primary-container": "#531900",
                        "surface-variant": "#e2e2e4",
                        "surface-bright": "#f9f9fb",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#5b4137",
                        "primary": "#a63b00",
                        "on-primary": "#ffffff",
                        "surface-tint": "#a63b00",
                        "surface-container-high": "#e8e8ea",
                        "surface-container": "#eeeef0",
                        "surface-container-highest": "#e2e2e4",
                    },
                    fontFamily: {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f5f7;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .executive-shadow {
            box-shadow: 0 10px 30px rgba(26, 28, 29, 0.04);
        }
        .citrus-gradient {
            background: linear-gradient(145deg, #ff5e00 0%, #a63b00 100%);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="text-on-surface min-h-screen">
    <main class="min-h-screen">
        {% block content %}
        {% endblock %}
    </main>
    {% block extra_body %}{% endblock %}
    <script src="{% static 'js/barpilote-theme.js' %}"></script>
</body>
</html>
