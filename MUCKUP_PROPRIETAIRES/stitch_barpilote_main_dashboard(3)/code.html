<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f5f7;
        }
        .executive-shadow {
            box-shadow: 0 10px 30px rgba(26, 28, 29, 0.04);
        }
        .orange-gradient {
            background: linear-gradient(145deg, #ff5e00 0%, #a63b00 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface">
<!-- TopAppBar -->
<header class="bg-[#F5F5F7]/80 backdrop-blur-md fixed top-0 w-full z-50 shadow-[0_10px_30px_rgba(26,28,29,0.04)]">
<div class="flex justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-4">
<button class="text-orange-600 hover:bg-slate-200/50 transition-all p-2 rounded-full active:scale-95 duration-200 ease-in-out">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-slate-900 font-semibold tracking-tight text-xl">Identité du Bar</h1>
</div>
<div class="text-xl font-black text-orange-600 tracking-tighter">
                Aero-Identity
            </div>
<button class="text-slate-400 hover:bg-slate-200/50 transition-all p-2 rounded-full active:scale-95 duration-200 ease-in-out">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</header>
<main class="pt-24 pb-12 px-4 max-w-2xl mx-auto min-h-screen">
<!-- Content Canvas -->
<div class="bg-surface-container-lowest rounded-xl executive-shadow overflow-hidden">
<div class="p-8 space-y-10">
<!-- Bar Logo/Photo Selection -->
<div class="flex flex-col items-center justify-center space-y-4">
<div class="relative group">
<div class="w-32 h-32 rounded-full bg-surface-container flex items-center justify-center border-4 border-surface-container-lowest executive-shadow transition-transform active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface-variant text-4xl">camera_alt</span>
</div>
<label class="absolute bottom-0 right-0 bg-primary-container text-white p-2 rounded-full cursor-pointer shadow-lg active:scale-90 transition-transform">
<span class="material-symbols-outlined text-sm">edit</span>
<input class="hidden" type="file"/>
</label>
</div>
<div class="text-center">
<p class="text-on-surface font-semibold">Bar Logo/Photo</p>
<p class="text-on-surface-variant text-xs uppercase tracking-widest font-label mt-1">Établissez votre marque</p>
</div>
</div>
<!-- Identity Form -->
<div class="space-y-6">
<!-- Nom du Bar -->
<div class="space-y-2">
<label class="text-[11px] font-bold uppercase tracking-widest text-on-surface-variant px-1">Nom du Bar</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none rounded-lg px-4 py-4 focus:ring-2 focus:ring-primary-container focus:bg-white transition-all duration-300 outline-none text-on-surface" placeholder="Entrez le nom de l'établissement" type="text"/>
</div>
</div>
<!-- Adresse du Bar -->
<div class="space-y-2">
<label class="text-[11px] font-bold uppercase tracking-widest text-on-surface-variant px-1">Adresse du Bar</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none rounded-lg px-4 py-4 pr-12 focus:ring-2 focus:ring-primary-container focus:bg-white transition-all duration-300 outline-none text-on-surface" placeholder="Adresse précise à Kinshasa" type="text"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-primary hover:text-primary-container transition-colors">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
</div>
</div>
<!-- Map Snippet -->
<div class="space-y-3">
<div class="flex justify-between items-center px-1">
<label class="text-[11px] font-bold uppercase tracking-widest text-on-surface-variant">Localisation Kinshasa</label>
<span class="text-[10px] text-primary font-bold">CARTE ACTIVE</span>
</div>
<div class="w-full h-48 rounded-lg overflow-hidden bg-surface-container relative">
<img class="w-full h-full object-cover opacity-80 grayscale-[20%]" data-alt="Modern satellite map view of Kinshasa city streets" data-location="Kinshasa" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDbwbJ2BKQkeTAfvLnloQVEJbX5JOKvE2yEa_9vZyrjmKkHJjreg-IiSHR3MxxivBTenmKZ7lNvZGdYjN9AlcFqtbm1Y7_MDeuyx8LRXckTrA7zCMwNmjwIjSzNI1TCQRHarTUqZBd_g-VIbs7F06CKbux8oYre8SSELAYAYXBAsBFb3nSyiX8t_9hYnd67Ku8xi15ioHgGXHnIW4rd0sZw2niGdZVCuDFVsr1RzFlNewUCLnq9JQbPMlYXd6bIR9iccnz66TAGPUqJ"/>
<!-- Map Pointer Overlay -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="relative">
<span class="material-symbols-outlined text-primary-container text-4xl" style="font-variation-settings: 'FILL' 1;">location_on</span>
<div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-4 h-1 bg-black/20 rounded-full blur-[2px]"></div>
</div>
</div>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full orange-gradient text-white font-bold py-5 rounded-full executive-shadow active:scale-95 transition-all duration-200 tracking-tight text-lg">
                        Establish Bar
                    </button>
</div>
</div>
</div>
<!-- Footnote / Help -->
<p class="mt-8 text-center text-on-surface-variant text-sm px-6">
            Ces informations seront utilisées pour configurer votre cockpit de gestion <span class="text-primary font-semibold">Aero-Identity</span>.
        </p>
</main>
<!-- BottomNavBar (Hidden on desktop as per Shell Visibility rules for transactional screens) -->
<!-- Suppressed: This is a setup/onboarding transactional screen -->
</body></html>
