{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Commande introuvable - BarPilote</title>
    <meta name="theme-color" content="#ff5e00">
    <link rel="manifest" href="{% static 'manifest.webmanifest' %}">
    <link rel="apple-touch-icon" href="{% static 'logo_orange.png' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>

        body { font-family: Inter, sans-serif; background: #f7f7f8; }
        .executive-shadow { box-shadow: 0 16px 50px rgba(26, 28, 29, 0.08); }
    </style>
    <link rel="stylesheet" href="{% static 'css/barpilote-theme.css' %}">
</head>
<body class="min-h-screen flex items-center justify-center px-4">
    <main class="w-full max-w-lg rounded-3xl bg-white border border-gray-200 executive-shadow p-8 text-center">
        <div class="mx-auto mb-6 flex h-16 w-16 items-center justify-center rounded-2xl bg-orange-50 text-orange-600">
            <span class="material-symbols-outlined text-3xl">receipt_long</span>
        </div>
        <h1 class="text-2xl font-black text-slate-900">Commande introuvable</h1>
        <p class="mt-3 text-sm font-medium text-slate-600">{{ message|default:"Cette commande n'existe plus ou n'est plus accessible." }}</p>
        {% if order_id %}
        <p class="mt-2 text-xs font-bold uppercase tracking-widest text-slate-400">Référence: {{ order_id }}</p>
        {% endif %}
        <div class="mt-8 flex flex-col gap-3 sm:flex-row sm:justify-center">
            <a href="/" class="inline-flex items-center justify-center gap-2 rounded-2xl bg-slate-900 px-5 py-3 text-sm font-black text-white transition hover:bg-orange-600">
                <span class="material-symbols-outlined text-base">home</span>
                Retour à l'accueil
            </a>
            <button type="button" onclick="history.back()" class="inline-flex items-center justify-center gap-2 rounded-2xl border border-gray-200 bg-white px-5 py-3 text-sm font-black text-slate-700 transition hover:bg-gray-50">
                <span class="material-symbols-outlined text-base">arrow_back</span>
                Revenir en arrière
            </button>
        </div>
    </main>
    <script src="{% static 'js/barpilote-pwa.js' %}"></script>
</body>
</html>
