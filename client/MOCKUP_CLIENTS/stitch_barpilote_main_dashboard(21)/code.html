<style>

        }
        .hero-zoom {
            animation: slowZoom 60s infinite alternate linear;
        }
        @keyframes slowZoom {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }

<body class="bg-on-background text-white font-body selection:bg-primary-container selection:text-white overflow-hidden">

</div>

<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-8 py-6 pointer-events-none">
<div class="flex items-center gap-2 pointer-events-auto">

</div>
</header>
<!-- Main Content: The Peaceful Message -->
<main class="relative z-20 min-h-screen flex flex-col items-center justify-center text-center px-6">
<div class="animate-fade-in space-y-12 max-w-2xl">
<!-- Atmospheric Icon -->

<div class="w-16 h-16 rounded-full border border-white/10 flex items-center justify-center glass-panel">
<span class="material-symbols-outlined text-white/50 text-3xl">dark_mode</span>
</div>
</div>
<!-- Central Typography -->
<div class="space-y-4">
<h2 class="font-sans tracking-[0.3em] text-[0.6875rem] font-bold uppercase text-primary-container animate-pulse">Service Terminé</h2>
<h1 class="text-5xl md:text-7xl font-extralight tracking-tight text-white text-glow">
                    Réouverture à <span class="font-medium">18h</span>
</h1>
</div>

</div>
<!-- Interaction: Notify Me (Secondary Action) -->

<div class="relative flex items-center gap-3">
<span class="material-symbols-outlined text-sm">notifications</span>
<span class="font-sans tracking-[0.1em] text-[0.6875rem] font-semibold uppercase text-white">M'avertir à l'ouverture</span>

</button>
</div>
</div>

</div>
</div>

<p class="font-mono text-[0.75rem] text-white/60 tabular-nums tracking-widest uppercase" id="live-clock">
                PARIS 04:12:08
            </p>
</div>
</footer>
<!-- Atmosphere Micro-interaction Script -->
<script>
        // Smoothly update the clock
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('fr-FR', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit', 
                hour12: false 
            });
            document.getElementById('live-clock').innerText = `PARIS ${timeString}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Subtle mouse parallax for the background
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 15;
            const y = (e.clientY / window.innerHeight - 0.5) * 15;
            const img = document.querySelector('.hero-zoom');
            img.style.transform = `translate(${x}px, ${y}px) scale(1.1)`;
        });
    </script>
</body></html>
