<style>
        @keyframes drawCheck {
            0% { stroke-dashoffset: 48; }
            100% { stroke-dashoffset: 0; }
        }
        @keyframes scaleUp {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .check-anim {
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            animation: drawCheck 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards 0.3s;
        }
        .fade-in-up {
            animation: scaleUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        .progress-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<script>
        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.querySelector('.bg-primary.rounded-full');
            let progress = 45;
            
            const interval = setInterval(() => {
                if(progress < 95) {
                    progress += (Math.random() * 2);
                    progressBar.style.width = `${progress}%`;
                }
            }, 3000);

            const buttons = document.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const ripple = document.createElement('div');
                    ripple.className = 'absolute inset-0 bg-white/20 rounded-full animate-ping';
                    btn.style.position = 'relative';
                    btn.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 1000);
                });
            });
        });
    </script>
