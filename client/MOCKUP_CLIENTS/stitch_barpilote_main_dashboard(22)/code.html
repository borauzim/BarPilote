<!-- Micro-interaction script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Subtle scroll reveal for the recommendations
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('opacity-100', 'translate-y-0');
                        entry.target.classList.remove('opacity-0', 'translate-y-4');
                    }
                });
            }, { threshold: 0.1 });

            const recommendationSection = document.querySelector('section:nth-of-type(2)');
            recommendationSection.classList.add('transition-all', 'duration-700', 'opacity-0', 'translate-y-4');
            observer.observe(recommendationSection);
        });
    </script>
