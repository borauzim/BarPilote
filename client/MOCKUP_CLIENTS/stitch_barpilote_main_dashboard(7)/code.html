</div>
<div class="text-right">

<p class="text-[0.6875rem] font-label text-on-surface-variant opacity-50 uppercase tracking-wider">4.00€ / Unité</p>

</div>

<div class="flex justify-between items-start">
<div class="flex gap-6">
<div class="w-20 h-20 bg-surface-container rounded-xl overflow-hidden flex-shrink-0">
<img alt="Fanta Orange" class="w-full h-full object-cover" data-alt="A vibrant, close-up lifestyle shot of a tall glass filled with ice cubes and bright orange Fanta soda, with a fresh orange slice garnish. The scene is set on a bright white marble surface under soft, natural daylight, creating a clean and airy high-end UI look. The focus is sharp on the bubbles and the texture of the orange rind, embodying a refreshing hospitality experience." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAqTR84_U1tOjaUtZIpPD1oq_7PUVb423uEY7NQIwEWN5UlPMGr-FNzKILw72cr-je6xznroBOfZgVIRM1NoZIv10R1c4hQHO3vto4bWa-QygDUz3Y7Dtbsb3Yy9VNmO3NGS_6jy1qkGPIO4VmIhOlfrN9r1C-ZV9AAu2dzI4iZuWaYTftpvp1JtrnqJujnHd0iB8OPSMX-_jWUFvjhcVa3yooYPPC1EgSGkFtdQcmnFCg79RANpfgFQnuFrNcfP5Hb3Wxw9DUlWi-s"/>

</div>
<div class="text-right">
<p class="text-lg font-bold text-on-surface">4.50€</p>
<p class="text-[0.6875rem] font-label text-on-surface-variant opacity-50 uppercase tracking-wider">4.50€ / Unité</p>
</div>
</div>
</div>

<!-- Order Summary Detail -->

            </button>
</div>

<!-- BottomNavBar (Hidden on transactional screen as per protocol, but included for structure if needed) -->
<!-- Not rendered to prioritize the checkout focus -->
<script>
        // Micro-interaction for list item hover
        document.querySelectorAll('.bg-surface-container-lowest').forEach(card => {
            card.addEventListener('mouseenter', () => {
                card.classList.add('scale-[1.01]');
                card.classList.replace('executive-shadow', 'shadow-xl');
            });
            card.addEventListener('mouseleave', () => {
                card.classList.remove('scale-[1.01]');
                card.classList.replace('shadow-xl', 'executive-shadow');
            });
        });

        // Sticky Header scroll effect
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 20) {
                header.classList.add('py-2', 'shadow-lg');
                header.classList.remove('py-4', 'shadow-sm');
            } else {
                header.classList.remove('py-2', 'shadow-lg');
                header.classList.add('py-4', 'shadow-sm');
            }
        });
    </script>
</body></html>
