<div class="h-24 md:hidden"></div>
<script>
        // Interactive Star Rating Logic
        const stars = document.querySelectorAll('.star-btn');
        const ratingLabel = document.getElementById('rating-label');
        const labels = {
            1: "Décevant",
            2: "Passable",
            3: "Bien",
            4: "Très Bien",
            5: "Exceptionnel"
        };

        stars.forEach(star => {
            star.addEventListener('click', () => {
                const value = parseInt(star.getAttribute('data-value'));
                updateStars(value);
                showLabel(value);
            });

            star.addEventListener('mouseenter', () => {
                const value = parseInt(star.getAttribute('data-value'));
                previewStars(value);
            });

            star.addEventListener('mouseleave', () => {
                resetStars();
            });
        });

        let currentRating = 0;

        function updateStars(rating) {
            currentRating = rating;
            stars.forEach(s => {
                const sValue = parseInt(s.getAttribute('data-value'));
                const icon = s.querySelector('span');
                if (sValue <= rating) {
                    icon.classList.add('star-active');
                } else {
                    icon.classList.remove('star-active');
                }
            });
        }

        function previewStars(rating) {
            stars.forEach(s => {
                const sValue = parseInt(s.getAttribute('data-value'));
                const icon = s.querySelector('span');
                if (sValue <= rating) {
                    icon.style.color = '#FF5E00';
                    icon.style.opacity = '0.7';
                } else {
                    icon.style.color = '#d1d5db';
                    icon.style.opacity = '1';
                }
            });
        }

        function resetStars() {
            stars.forEach(s => {
                const sValue = parseInt(s.getAttribute('data-value'));
                const icon = s.querySelector('span');
                icon.style.opacity = '1';
                if (sValue <= currentRating) {
                    icon.classList.add('star-active');
                    icon.style.color = '#FF5E00';
                } else {
                    icon.classList.remove('star-active');
                    icon.style.color = '#d1d5db';
                }
            });
        }

        function showLabel(value) {
            ratingLabel.innerText = labels[value];
            ratingLabel.style.opacity = '1';
        }

        // Tag Toggle Simulation
        const tags = document.querySelectorAll('button.rounded-full.bg-surface-container');
        tags.forEach(tag => {
            tag.addEventListener('click', () => {
                tag.classList.toggle('bg-[#FF5E00]/10');
                tag.classList.toggle('text-[#FF5E00]');
                tag.classList.toggle('bg-surface-container');
                tag.classList.toggle('text-zinc-600');
            });
        });

        // Submit Button Interaction
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.addEventListener('click', () => {
            if (currentRating === 0) {
                ratingLabel.innerText = "Veuillez choisir une note";
                ratingLabel.style.opacity = '1';
                ratingLabel.classList.add('text-error');
                return;
            }
            
            submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
            setTimeout(() => {
                submitBtn.innerHTML = 'Merci !';
                submitBtn.classList.replace('primary-gradient', 'bg-zinc-800');
                alert('Merci pour votre retour ! Votre avis a été enregistré.');
            }, 1500);
        });
    </script>
